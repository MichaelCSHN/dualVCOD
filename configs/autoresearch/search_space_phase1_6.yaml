# =============================================================================
# Phase 1.6 Controlled AutoResearch — Search Space Definition (Revision 1)
# =============================================================================
# Purpose: systematically explore architecture/training variations above the
# clean lower-bound baseline (mIoU=0.2861, 1.4M MobileNetV3-Small) while
# staying within drone-edge deployable budgets (5–35M params).
#
# Revision 1 changes from v1:
#   - Staged smoke plan: B0 (baseline proxy) → B1 (backbone swap) → B2 (sampler/head)
#   - Eval T = training T (primary); T=5 is diagnostic only
#   - Hard reject: staged thresholds (5ep / 12ep), empty_preds, area_ratio bounds
#   - Scoring: area penalty, empty penalty, instability penalty
#   - Two area metrics: global_area_ratio + mean_sample_area_ratio
#   - objectness_aux_head + video_balanced deferred to B2+
#
# DO NOT EDIT this file casually — changes invalidate trial comparability.
# =============================================================================

meta:
  phase: "1.6"
  version: 2
  description: >
    Controlled AutoResearch for Clean GreenVCOD Upgrade — Revision 1.
    Target: 5–15M light drone mainline, 15–35M compact edge performance.
  baseline:
    checkpoint: "clean_seed42_best_miou.pth"
    miou: 0.2861
    recall_at_0_5: 0.1978
    recall_at_0_3: 0.4141
    center_prior_miou: 0.2017
    empty_pred_rate: 0.0
    global_area_ratio: 0.8640
    params: "1.4M"
    backbone: "mobilenet_v3_small"
    input_size: 224
    temporal_t: 5

# ── Fixed Protocol (all trials share these) ────────────────────────────────
fixed_protocol:
  # Data isolation
  train_datasets:
    - "D:\\ML\\COD_datasets\\MoCA"
    - "D:\\ML\\COD_datasets\\MoCA_Mask"
    - "D:\\ML\\COD_datasets\\CamouflagedAnimalDataset"
  val_dataset: "D:\\ML\\COD_datasets\\MoCA"
  val_ratio: 0.2
  split_seed: 42
  canonical_video_id_filter: true
  # Optimizer
  optimizer: "adamw"
  weight_decay: 1.0e-4
  scheduler: "cosine_annealing"
  # Training
  amp: true
  grad_clip_norm: 2.0
  num_workers: 4
  # Eval
  eval_augmentation: false
  eval_primary_T: "same_as_training"   # eval T MUST equal training temporal_T
  eval_diagnostic_T5: "if_model_supports"  # run T=5 diagnostic pass when architecture allows
  eval_authoritative_precision: "fp32"
  # Safety
  no_commit: true
  no_push: true
  no_checkpoint_in_repo: true
  checkpoints_local_only: true

# ── Search Dimensions ───────────────────────────────────────────────────────
dimensions:
  backbone:
    type: categorical
    description: "torchvision backbone for FPN spatial encoder"
    values:
      - mobilenet_v3_small    # current baseline — 1.4M total (B0 only, not in B1/B2 search)
      - mobilenet_v3_large    # ~5.5M total
      - efficientnet_b0       # ~5.3M total
      - efficientnet_b1       # ~7.8M total
      - efficientnet_b2       # ~9.1M total

  input_size:
    type: categorical
    description: "frame resize target (H=W). Must be divisible by 32."
    values: [224, 512, 640]
    # 224 is baseline-proxy only; 512/640 are search dimensions

  temporal_T:
    type: categorical
    description: "number of frames per training clip window. Eval primary T matches this."
    values: [3, 5]

  sampler:
    type: categorical
    description: "how windows are drawn from videos"
    values:
      - window_uniform     # current: uniform sampling, large videos dominate
      - video_balanced     # [B2+ only] each video ~equal windows per epoch

  lr:
    type: categorical
    description: "AdamW initial learning rate"
    values: [3.0e-4, 1.0e-3]

  head:
    type: categorical
    description: "detection head architecture"
    values:
      - current_direct_bbox     # current 2-layer MLP -> (x1,y1,x2,y2)
      - objectness_aux_head     # [B2+ only] bbox head + parallel objectness (BCE aux loss)

# ── Feature Availability by Phase ───────────────────────────────────────────
phase_feature_matrix:
  B0_baseline_proxy:
    backbone: [mobilenet_v3_small]   # baseline backbone ONLY
    input_size: [224]                # baseline input size ONLY
    temporal_T: [5]                  # baseline T ONLY
    sampler: [window_uniform]
    head: [current_direct_bbox]
    lr: [1.0e-3]

  B1_backbone_smoke:
    backbone: [efficientnet_b0, efficientnet_b1, efficientnet_b2, mobilenet_v3_large]
    input_size: [512, 640]
    temporal_T: [3, 5]
    sampler: [window_uniform]        # window_uniform ONLY in B1
    head: [current_direct_bbox]      # current_direct_bbox ONLY in B1
    lr: [3.0e-4, 1.0e-3]

  B2_sampler_head_smoke:
    backbone: [efficientnet_b0, efficientnet_b1, efficientnet_b2, mobilenet_v3_large]
    input_size: [512, 640]
    temporal_T: [3, 5]
    sampler: [window_uniform, video_balanced]  # video_balanced enabled
    head: [current_direct_bbox, objectness_aux_head]  # aux head enabled
    lr: [3.0e-4, 1.0e-3]

# ── Trial Constraints ───────────────────────────────────────────────────────
constraints:
  max_params: 35_000_000
  min_params: 3_000_000   # waived for B0 baseline proxy

# ── Phase Schedule (Staged) ─────────────────────────────────────────────────
schedule:
  phase_1_6_B0:
    name: "Baseline Reproduction Proxy"
    trials: 1
    epochs: 3     # 1–3 epochs, just enough to confirm metric parity
    description: >
      Reproduce current baseline (mobilenet_v3_small, sz=224, T=5,
      window_uniform, current_direct_bbox, lr=1e-3) via run_trial.py.
      Goal: verify run_trial.py produces identical dataloader, loss,
      metric, manifest, checkpoint to original train.py.
      Acceptance: val_mIoU at epoch 3 within 0.03 of train.py epoch 3.
    recommended_trials:
      - id: "smoke_b0_baseline_proxy"
        backbone: "mobilenet_v3_small"
        input_size: 224
        temporal_T: 5
        sampler: "window_uniform"
        lr: 1.0e-3
        head: "current_direct_bbox"
        train_seed: 42
        hypothesis: >
          run_trial.py with current baseline config reproduces train.py output.
          DataLoader manifest, loss curve, and val metrics must match Phase 1.5
          epoch 1–3 values within numerical tolerance.

  phase_1_6_B1:
    name: "Backbone-Swappable Smoke"
    trials: 3
    epochs: 5     # 3–5 epochs, stable enough for backbone comparison
    description: >
      Test 3 new backbones with window_uniform sampler and current_direct_bbox
      head. No sampler variation. No head variation. Isolate backbone effect.
    prerequisites: "B0 must PASS baseline proxy acceptance check"
    recommended_trials:
      - id: "smoke_b1_effb0"
        backbone: "efficientnet_b0"
        input_size: 512
        temporal_T: 5
        sampler: "window_uniform"
        lr: 1.0e-3
        head: "current_direct_bbox"
        train_seed: 42
        hypothesis: >
          EfficientNet-B0 at 512px with T=5 — tests minimal backbone upgrade
          (5.3M vs 1.4M) at moderate resolution. Expected: higher capacity
          should improve spatial feature quality.
      - id: "smoke_b1_mnv3large"
        backbone: "mobilenet_v3_large"
        input_size: 512
        temporal_T: 5
        sampler: "window_uniform"
        lr: 1.0e-3
        head: "current_direct_bbox"
        train_seed: 42
        hypothesis: >
          MobileNetV3-Large at 512px with T=5 — tests MV3 family scaling
          (5.5M vs 1.4M). Same architecture family, more channels.
      - id: "smoke_b1_effb1"
        backbone: "efficientnet_b1"
        input_size: 512
        temporal_T: 5
        sampler: "window_uniform"
        lr: 3.0e-4
        head: "current_direct_bbox"
        train_seed: 42
        hypothesis: >
          EfficientNet-B1 at 512px with T=5 — tests intermediate backbone
          (7.8M) with lower LR for stability at higher capacity.

  phase_1_6_B2:
    name: "Sampler + Head Smoke"
    trials: 3
    epochs: 5
    description: >
      After B1 confirms backbone-swappable path works, introduce
      video_balanced sampler and objectness_aux_head on best backbone(s).
    prerequisites: "B1 must have ≥1 trial with mIoU > baseline_mIoU - 0.02"
    recommended_trials:
      - id: "smoke_b2_vidbal"
        backbone: "TBD_from_B1"        # best B1 backbone
        input_size: "TBD_from_B1"       # best B1 input_size
        temporal_T: 5
        sampler: "video_balanced"
        lr: 1.0e-3
        head: "current_direct_bbox"
        train_seed: 42
        hypothesis: "video_balanced prevents large-video dominance"
      - id: "smoke_b2_objhead"
        backbone: "TBD_from_B1"
        input_size: "TBD_from_B1"
        temporal_T: 5
        sampler: "window_uniform"
        lr: 1.0e-3
        head: "objectness_aux_head"
        train_seed: 42
        hypothesis: "objectness aux head reduces no_response errors"
      - id: "smoke_b2_combined"
        backbone: "TBD_from_B1"
        input_size: "TBD_from_B1"
        temporal_T: 5
        sampler: "video_balanced"
        lr: 1.0e-3
        head: "objectness_aux_head"
        train_seed: 42
        hypothesis: "video_balanced + aux head together may interact positively"

  phase_1_6_C:
    name: "Exploration Trials"
    trials: 24
    epochs: 5
    description: "Latin Hypercube sampling across dimensions validated in B1/B2"
    method: "latin_hypercube"
    prerequisites: "B1 and B2 smoke must be complete"

  phase_1_6_D:
    name: "Top-8 Promotion"
    trials: 8
    epochs: 12
    description: "Top 8 by scoring function from Phase 1.6-C, extended to 12 epochs"

  phase_1_6_E:
    name: "Top-3 Promotion"
    trials: 3
    epochs: 30
    description: "Top 3 by scoring function from Phase 1.6-D, full 30-epoch training"

  phase_1_6_F:
    name: "Multi-Seed Confirmation"
    trials: 4
    epochs: 30
    seeds: [123, 456]
    description: "Top 1–2 configs retrained with different seeds"

# ── Scoring Function (Enhanced) ─────────────────────────────────────────────
scoring:
  primary: "val_miou_fp32"
  secondary:
    - "val_recall_at_0_5"
    - "val_recall_at_0_3"

  # Composite = base - area_penalty - empty_penalty - instability_penalty
  #
  # base = 1.0 × val_miou + 0.3 × val_recall_at_0_5 + 0.2 × val_recall_at_0_3
  #
  # area_penalty:
  #   abs(log(global_area_ratio)) × 0.05   — penalize systematic over/under-sizing
  #
  # empty_penalty:
  #   empty_pred_rate × 0.50   — penalize dead predictions strongly
  #
  # instability_penalty:
  #   0.02 if val_miou_std_last_3_epochs > 0.03 else 0.0   — penalize unstable training
  #
  composite_formula: >
    base = miou + 0.3*r05 + 0.2*r03
    area_penalty = abs(ln(global_area_ratio)) * 0.05
    empty_penalty = empty_pred_rate * 0.50
    instability_penalty = 0.02 if std(miou_last_3) > 0.03 else 0.0
    composite = base - area_penalty - empty_penalty - instability_penalty

  tiebreaker_order:
    - "total_params"   # fewer params first
    - "val_fps"        # faster inference first
    - "val_miou"       # higher mIoU first

  # Two area metrics — both recorded, global_area_ratio used in penalty
  area_metrics:
    global_area_ratio:
      formula: "mean(pred_area) / mean(gt_area)"
      description: "Aggregate-level ratio. Near 1.0 = unbiased on average."
    mean_sample_area_ratio:
      formula: "mean(pred_area_i / gt_area_i) per sample"
      description: "Per-sample ratio mean. Captures per-sample calibration."

# ── Hard Reject Rules (Staged by Epochs) ────────────────────────────────────
hard_reject:

  # ── Always-fire rules (any epoch) ──────────────────────────────────
  - rule: "oom"
    description: "CUDA OutOfMemoryError on RTX 4090 (24 GiB)"
    condition: "CUDA OOM at any point"
  - rule: "nan_loss"
    description: "NaN in training loss at any step"
    condition: "NaN in loss"
  - rule: "data_leak_detected"
    description: "check_trial_safety.py FAIL or canonical_video_id overlap > 0"
    condition: "safety_check FAIL or data leak detected"
  - rule: "param_budget_exceeded"
    description: "Model param count > 35M"
    condition: "total_params > 35_000_000"

  # ── After 5 epochs ─────────────────────────────────────────────────
  - rule: "weak_after_5ep"
    description: "mIoU below center_prior + 0.03 — model barely beating spatial prior"
    condition: "epochs >= 5 AND val_miou < center_prior_miou + 0.03"
    action: "mark_weak"
    # Weak trials are flagged but not hard-rejected. They CANNOT be promoted.
  - rule: "diverging_loss_after_5ep"
    description: "Training loss > 2× epoch-1 loss — training unstable"
    condition: "epochs >= 5 AND loss[epoch_N] > 2 × loss[epoch_1]"
    action: "hard_reject"

  # ── After 12 epochs ────────────────────────────────────────────────
  - rule: "miou_below_baseline_12ep"
    description: "mIoU below baseline_mIoU - 0.03 — significantly worse than 1.4M baseline"
    condition: "epochs >= 12 AND val_miou < baseline_mIoU - 0.03"
    action: "hard_reject"
  - rule: "recall_below_baseline_12ep"
    description: "R@0.5 below baseline_R@0.5 - 0.05 — recall collapsed"
    condition: "epochs >= 12 AND val_recall_at_0_5 < baseline_R_at_0_5 - 0.05"
    action: "hard_reject"

  # ── Universal structural rules (any epoch, after training completes) ─
  - rule: "empty_prediction_rate"
    description: "> 2% of predictions have zero area — model not engaging"
    condition: "empty_pred_count / total_preds > 0.02"
    action: "hard_reject"
  - rule: "global_area_ratio_extreme"
    description: "global_area_ratio < 0.4 or > 2.5 — systematic bbox scale failure"
    condition: "global_area_ratio < 0.4 OR global_area_ratio > 2.5"
    action: "hard_reject"

# ── Promotion Rules (Updated for Staged Phases) ─────────────────────────────
promotion:
  B0_to_B1:
    description: "Baseline proxy must reproduce train.py metrics within tolerance"
    condition: "B0 val_miou_at_epoch_3 within 0.03 of train.py epoch_3 AND pass all always-fire rules"
  B1_to_B2:
    description: "At least 1 B1 trial with mIoU > baseline_mIoU - 0.02"
    condition: "B1 best_val_miou > baseline_mIoU - 0.02 AND pass hard_reject (not marked weak)"
  B2_to_C:
    description: "All B2 trials that pass hard-reject enter C pool"
    condition: "pass hard_reject AND NOT marked weak"
  C_to_D:
    description: "Top 8 by composite score"
    condition: "rank <= 8 AND pass hard_reject AND NOT marked weak"
  D_to_E:
    description: "Top 3 by composite score, must show improvement over baseline"
    condition: "rank <= 3 AND val_miou > baseline_mIoU + 0.01 AND pass hard_reject"
  E_to_F:
    description: "Top 2 by composite score, must have stable training curve"
    condition: "rank <= 2 AND pass hard_reject AND val_miou_std_last_5_epochs < 0.02"
